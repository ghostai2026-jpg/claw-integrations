name: Claw Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  claw-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenAI
        run: pip install --upgrade openai

      - name: Run OpenAI Test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/openai_test.py
