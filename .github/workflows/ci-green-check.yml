name: CI Green Check

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  issues: write

jobs:
  green-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Basic sanity check
        run: |
          echo "CI Green Check running..."
          ls -la

      # ✅ Replace this step later with your real test/build commands
      - name: Placeholder command (always succeeds)
        run: |
          echo "All good ✅"

  create-issue-on-failure:
    needs: green-check
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Issue for failure
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `🚨 CI failed: ${context.workflow} (#${context.runNumber})`;
            const body = [
              `The workflow **${context.workflow}** failed.`,
              ``,
              `**Run link:** ${runUrl}`,
              ``,
              `**Commit:** ${context.sha}`,
              ``,
              `Please open the run, check the failed step logs, and fix the cause.`,
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["automation", "ci-failure"]
            });
